<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>ROTE Planner by Leo Reichelt</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<div id="simHeaderFields">
<label>PG Guilda <input id="guildGP" value="326610750"></label>
<label>Jogadores <input id="players" value="41"></label>
<label>Inativos <input id="inactive" value="2"></label>
<label>Margem segurança <input id="safe" value="3"></label>
<label>Crescimento diário/jogador <input id="dailyGrowth" type="number" value="5500"></label>
</div>

<div id="gpProjectionInfo"></div>

<div>
PG Total
<div id="totalGP" style="color:#4ade80;font-weight:bold;">0</div>
</div>

<div>
PG ativo máximo
<div id="activeGPmax" style="color:#4da6ff;">0</div>
</div>

<div>
PG ativo mínimo
<div id="activeGPmin" style="color:#c2410c;">0</div>
</div>

<div class="starCounter" id="starResult"></div>

<button onclick="handleBriefing(); generateOfficerBriefing();">
Briefing para oficiais
</button>
<button id="btnSimMode" onclick="toggleSimMode()" title="Modo simulação: editar dados manualmente">⚗ Simulação</button>
<button onclick="toggleSettingsPanel()">⚙ Settings</button>

<div id="settingsPanel" style="display:none;position:absolute;top:60px;right:10px;width:280px;background:#1e293b;border:1px solid #475569;border-radius:8px;padding:14px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,0.5);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <strong>⚙ Configurações</strong>
    <span onclick="toggleSettingsPanel()" style="cursor:pointer;color:#94a3b8;font-size:16px;">✕</span>
  </div>
  <div id="settingsPanelContent"></div>
</div>
<div id="roteHistoryPanel"></div>
</header>

<div class="container">

  <div class="left">
    <h3>Fases</h3>
    <div id="phaseList"></div>
  </div>

  <div class="map">
    <div id="galaxyMap">
      <img src="assets/rote-map.png" id="roteMap">
      <div id="planetInfoBox" class="planetInfoBox hidden"></div>
      <div id="planetLayer"></div>

      <div id="planetFloatBox">
        <span id="planetFloatClose" onclick="closePlanetFloat()">✕</span>
        <h3 id="planetFloatName">Planeta</h3>

        <label>Fase
          <select id="planetPhase" onchange="updatePlanetPlatoonStatus()">
            <option value="">—</option>
            <option value="1">F1</option>
            <option value="2">F2</option>
            <option value="3">F3</option>
            <option value="4">F4</option>
            <option value="5">F5</option>
            <option value="6">F6</option>
          </select>
        </label>

        <div id="planetPlatoonStatus" style="font-size:11px;margin:4px 0;min-height:16px;"></div>

        <div id="planetBattleInfo" style="font-size:11px;margin:4px 0;"></div>

        <label id="possibleBattlesLabel">Batalhas possíveis (manual)
          <input id="possibleBattles" type="number">
        </label>

        <a id="planetMapLink" href="#" target="_blank"
           style="display:none;font-size:11px;color:#4da6ff;margin:4px 0;display:block;">
          🗺 Ver mapa do planeta
        </a>

        <div id="planetSimFields">
        <label>Platoons
          <input id="platoons" type="number" min="0" max="6">
        </label>
        </div>

        <label id="specialMissionBox" style="display:none;align-items:center;gap:6px;">
          🔓 Vitórias missão especial:
          <input type="number" id="specialMissionToggle" min="0" max="200" style="width:60px;">
          <span id="specialMissionStatus" style="font-size:10px;color:#94a3b8;"></span>
        </label>

        <button onclick="savePlanet()">Salvar</button>
      </div>

    </div>
  </div>

 <div class="right">
  <div id="farmCritical"></div>
  <h3>Platoons</h3>
  <div id="platoonList"></div>
</div>

</div>
<script src="data/rewards.js"></script>
<script src="data/combatData.js"></script>
<script src="data/planetData.js"></script>
<script src="data/planetPositions.js"></script>
<script src="data/unitNames.js"></script>
<script src="data/platoonRequirements.js"></script>
<script src="data/squadMeta.js"></script>
<script src="data/journeyReqs.js"></script>

<script src="utils/format.js"></script>
<script src="utils/phaseUtils.js"></script>

<script src="state/state.js"></script>
<script src="state/persistence.js"></script>
<script src="state/history.js"></script>

<script src="core/gpEngine.js"></script>
<script src="core/planetEngine.js"></script>
<script src="core/phaseEngine.js"></script>
<script src="core/starOptimizer.js"></script>
<script src="core/strategyEngine.js"></script>
<script src="core/calculations.js"></script>
<script src="core/guildEngine.js"></script>
<script src="core/rosterEngine.js"></script>
<script src="core/combatEngine.js"></script>
<script src="core/farmEngine.js"></script>
<script src="core/squadFarmEngine.js"></script>

<script src="ui/drawPlanetList.js"></script>
<script src="ui/drawGalaxyMap.js"></script>
<script src="ui/drawPhaseList.js"></script>
<script src="ui/drawPlatoonList.js"></script>
<script src="ui/drawFarmList.js"></script>
<script src="ui/handlers.js"></script>
<script src="ui/briefings.js"></script>
<script src="ui/phaseGuide.js"></script>
<script src="ui/settingsPanel.js"></script>

<script src="app.js"></script>
</html>
